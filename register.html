<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#06080f">
<meta name="description" content="Matcha - ثبت‌نام سریع و امن">
<title>Matcha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#06080f;--bg2:rgba(10,15,28,.7);
--text:rgba(255,255,255,.92);--text-muted:rgba(255,255,255,.45);--text-dim:rgba(255,255,255,.35);
--field-bg:rgba(255,255,255,.08);--field-border:rgba(255,255,255,.15);
--label:rgba(255,255,255,.5);
--ic:rgba(255,255,255,.35);--terms-bg:rgba(255,255,255,.05);
--terms-border:rgba(255,255,255,.08);--uname-bg:rgba(52,199,89,.04);
--uname-border:rgba(52,199,89,.08);--counter:rgba(255,255,255,.25);
--badge-bg:rgba(255,255,255,.05);--badge-border:rgba(255,255,255,.08);
--badge-text:rgba(255,255,255,.55);--badge-hover:rgba(255,255,255,.1);
--badge-hover-border:rgba(255,255,255,.18);--badge-hover-text:rgba(255,255,255,.8);
--hdr-p:rgba(255,255,255,.45);--loader-bg:#06080f;
--loader-sub:rgba(255,255,255,.35);--loader-bar-bg:rgba(255,255,255,.05);
--ld-ring-a1:rgba(52,199,89,.5);--ld-ring-a2:rgba(52,199,89,.1);
--ld-ring-b1:rgba(102,126,234,.3);--ld-ring-b2:rgba(102,126,234,.06);
--ld-ring-c1:rgba(160,120,255,.15);--ld-ring-c2:rgba(160,120,255,.03);
--dot-bg:rgba(52,199,89,.4);--g1:rgba(52,199,89,.15);--g2:rgba(102,126,234,.12);--g3:rgba(175,82,222,.1);
--toggle-bg:rgba(255,255,255,.06);--toggle-border:rgba(255,255,255,.08);
}
html.light{
--bg:#f5f5f7;--bg2:rgba(255,255,255,.82);
--text:rgba(0,0,0,.88);--text-muted:rgba(0,0,0,.5);--text-dim:rgba(0,0,0,.4);
--field-bg:rgba(0,0,0,.03);--field-border:rgba(0,0,0,.1);
--label:rgba(0,0,0,.45);
--ic:rgba(0,0,0,.25);--terms-bg:rgba(0,0,0,.03);
--terms-border:rgba(0,0,0,.06);--uname-bg:rgba(52,199,89,.05);
--uname-border:rgba(52,199,89,.1);--counter:rgba(0,0,0,.2);
--badge-bg:rgba(0,0,0,.03);--badge-border:rgba(0,0,0,.06);
--badge-text:rgba(0,0,0,.5);--badge-hover:rgba(0,0,0,.05);
--badge-hover-border:rgba(0,0,0,.12);--badge-hover-text:rgba(0,0,0,.75);
--hdr-p:rgba(0,0,0,.4);--loader-bg:#f5f5f7;
--loader-sub:rgba(0,0,0,.35);--loader-bar-bg:rgba(0,0,0,.05);
--ld-ring-a1:rgba(52,199,89,.4);--ld-ring-a2:rgba(52,199,89,.08);
--ld-ring-b1:rgba(102,126,234,.25);--ld-ring-b2:rgba(102,126,234,.05);
--ld-ring-c1:rgba(160,120,255,.12);--ld-ring-c2:rgba(160,120,255,.02);
--dot-bg:rgba(52,199,89,.35);--g1:rgba(52,199,89,.08);--g2:rgba(102,126,234,.06);--g3:rgba(175,82,222,.05);
--toggle-bg:rgba(0,0,0,.05);--toggle-border:rgba(0,0,0,.08);
}

/* ======================================================
   ✅ فیکس 1: dvh → vh (WebView ساپورت نمی‌کنه)
   ✅ فیکس 2: اضافه کردن فونت فارسی به‌عنوان fallback
   ====================================================== */
body{
  font-family:'Vazirmatn','Tahoma','Arial',sans-serif;
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  background:var(--bg);
  transition:padding-bottom .3s,background .3s,color .3s;
}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes shine{0%{left:-100%}100%{left:200%}}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes ringS{to{transform:rotate(360deg)}}
@keyframes dotB{0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-7px);opacity:1}}
@keyframes pShimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes checkPop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes badgePop{0%{opacity:0;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}
@keyframes pF1{0%{transform:translate(0,0);opacity:0}15%{opacity:.7}85%{opacity:.7}100%{transform:translate(20px,-100px);opacity:0}}
@keyframes pF2{0%{transform:translate(0,0);opacity:0}15%{opacity:.6}85%{opacity:.6}100%{transform:translate(-25px,-90px);opacity:0}}
@keyframes pF3{0%{transform:translate(0,0);opacity:0}15%{opacity:.5}85%{opacity:.5}100%{transform:translate(15px,-110px);opacity:0}}
@keyframes btnPulse{0%{box-shadow:0 8px 24px rgba(52,199,89,.25),inset 0 1px 0 rgba(255,255,255,.12),0 0 0 0 rgba(52,199,89,.4)}70%{box-shadow:0 8px 24px rgba(52,199,89,.25),inset 0 1px 0 rgba(255,255,255,.12),0 0 0 10px rgba(52,199,89,0)}100%{box-shadow:0 8px 24px rgba(52,199,89,.25),inset 0 1px 0 rgba(255,255,255,.12),0 0 0 0 rgba(52,199,89,0)}}
.btn-main.pulse{animation:btnPulse 1.5s ease-in-out 3}
@keyframes borderGlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes blink{50%{opacity:0}}

/* ======================================================
   ✅ فیکس 3: inset → top/right/bottom/left
   ====================================================== */
.bg{position:fixed;top:0;right:0;bottom:0;left:0;z-index:0;background:var(--bg);transition:background .3s}
.bg-g1{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,var(--g1),transparent 70%);top:8%;left:5%;animation:float 8s ease-in-out infinite;transition:background .3s}
.bg-g2{position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,var(--g2),transparent 70%);bottom:15%;right:0;animation:float 10s ease-in-out infinite 2s;transition:background .3s}
.bg-g3{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,var(--g3),transparent 70%);top:45%;left:45%;animation:float 12s ease-in-out infinite 4s;transition:background .3s}

.px{position:fixed;top:0;right:0;bottom:0;left:0;z-index:0;overflow:hidden;pointer-events:none}
.pp{position:absolute;border-radius:50%;-webkit-will-change:transform,opacity;will-change:transform,opacity}
.pp.a{background:rgba(52,199,89,.5);width:3px;height:3px}
.pp.b{background:rgba(102,126,234,.4);width:2px;height:2px}
.pp.c{background:rgba(175,82,222,.35);width:2px;height:2px}
.pp:nth-child(3n+1){animation:pF1 6s ease-in-out infinite}
.pp:nth-child(3n+2){animation:pF2 7s ease-in-out infinite}
.pp:nth-child(3n){animation:pF3 8s ease-in-out infinite}
html.light .pp.a{background:rgba(52,199,89,.25)}
html.light .pp.b{background:rgba(102,126,234,.2)}
html.light .pp.c{background:rgba(175,82,222,.18)}

.prog{position:fixed;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.03);z-index:1000}
html.light .prog{background:rgba(0,0,0,.04)}
.prog-fill{height:100%;background:linear-gradient(90deg,#34c759,#667eea,#34c759);background-size:200% 100%;animation:pShimmer 2s linear infinite;border-radius:0 2px 2px 0;transition:width .4s ease;width:0}

.theme-toggle{position:fixed;top:14px;left:14px;z-index:50;width:40px;height:40px;border-radius:50%;background:var(--toggle-bg);border:1px solid var(--toggle-border);display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;cursor:pointer;transition:all .3s}
.theme-toggle:hover{background:var(--badge-hover);transform:scale(1.05)}
.theme-toggle:active{transform:scale(.95)}
.theme-toggle svg{width:18px;height:18px}
.theme-toggle .ic-moon{display:block;fill:rgba(255,255,255,.5)}
.theme-toggle .ic-sun{display:none;fill:rgba(0,0,0,.5)}
html.light .theme-toggle .ic-moon{display:none}
html.light .theme-toggle .ic-sun{display:block}

.wrap{position:relative;z-index:1;max-width:380px;margin:0 auto;padding:24px 18px 24px}

.card-glow{position:relative;padding:2px;border-radius:26px;background:linear-gradient(135deg,rgba(52,199,89,.2),rgba(102,126,234,.15),rgba(175,82,222,.12),rgba(52,199,89,.2));background-size:300% 300%;animation:borderGlow 6s ease infinite,cardIn .6s ease .15s both;transition:filter .3s}
html.light .card-glow{filter:saturate(.6)}
.card-inner{background:var(--bg2);border-radius:24px;padding:22px 18px;box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);position:relative;transition:background .3s,box-shadow .3s}
html.light .card-inner{box-shadow:0 4px 24px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.5)}

/* ======================================================
   ✅ فیکس 4: gap → margin در card-hdr
   ====================================================== */
.card-hdr{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;margin-bottom:20px;animation:slideRight .5s ease both}
.card-hdr-ic{position:relative;width:50px;height:50px;-webkit-flex-shrink:0;flex-shrink:0;animation:float 4s ease-in-out infinite;margin-left:14px}
.card-hdr-img{width:50px;height:50px;border-radius:14px;overflow:hidden}
.card-hdr-img img{width:100%;height:100%;object-fit:contain;display:block}
.card-hdr-txt{min-width:0;-webkit-flex:1;flex:1}
.card-hdr-txt h1{font-size:1.1rem;font-weight:800;line-height:1.4;margin-bottom:2px;min-height:1.5em}
#typewriter{background:linear-gradient(135deg,var(--text),var(--text-muted));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#cursor{display:inline-block;width:2px;height:1em;background:#34c759;margin-right:2px;vertical-align:text-bottom;animation:blink 1s step-end infinite}
.card-hdr-txt p{font-size:.76rem;color:var(--hdr-p);line-height:1.5;transition:color .3s}

/* ======================================================
   ✅ فیکس 5: gap → margin در attract badges
   ====================================================== */
.attract{display:-webkit-flex;display:flex;-webkit-justify-content:center;justify-content:center;-webkit-flex-wrap:wrap;flex-wrap:wrap;margin-bottom:16px;animation:up .4s ease .1s both}
.atr-badge{display:-webkit-inline-flex;display:inline-flex;-webkit-align-items:center;align-items:center;height:32px;padding:0 14px;background:var(--badge-bg);border:1px solid var(--badge-border);border-radius:20px;font-size:.7rem;color:var(--badge-text);font-weight:500;animation:badgePop .4s ease both;transition:all .25s;cursor:default;white-space:nowrap;margin:4px}
.atr-badge:nth-child(1){animation-delay:.15s}
.atr-badge:nth-child(2){animation-delay:.25s}
.atr-badge:nth-child(3){animation-delay:.35s}
.atr-badge svg{width:14px;height:14px;-webkit-flex-shrink:0;flex-shrink:0;transition:filter .25s}
.atr-badge:hover{background:var(--badge-hover);border-color:var(--badge-hover-border);color:var(--badge-hover-text)}
.atr-badge.badge-green:hover{border-color:rgba(52,199,89,.3);box-shadow:0 2px 14px rgba(52,199,89,.08)}
.atr-badge.badge-blue:hover{border-color:rgba(102,126,234,.3);box-shadow:0 2px 14px rgba(102,126,234,.08)}
.atr-badge:hover svg{-webkit-filter:brightness(1.3);filter:brightness(1.3)}
.online-dot{width:6px;height:6px;border-radius:50%;background:#34c759;-webkit-flex-shrink:0;flex-shrink:0;animation:pulse 2s ease-in-out infinite}
.online-count{color:#34c759;font-weight:700}

.av-sec{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;margin-bottom:18px}
.av-wrap{position:relative;width:90px;height:90px}
.av-ring{position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(from 0deg,#34c759,#667eea,#af52de,#f093fb,#34c759);background-size:100% 100%;animation:grad 4s ease infinite;opacity:.3;transition:opacity .3s;top:-3px;right:-3px;bottom:-3px;left:-3px}
.av-wrap:hover .av-ring{opacity:.7}
.av-circle{width:90px;height:90px;border-radius:50%;overflow:hidden;background:var(--field-bg);position:relative;z-index:1;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;border:3px solid var(--bg);cursor:pointer;transition:box-shadow .3s,border-color .3s}
.av-circle:hover{box-shadow:0 6px 20px rgba(52,199,89,.15),0 0 30px rgba(102,126,234,.08)}
.av-circle img{width:100%;height:100%;object-fit:cover;display:none}
.av-circle img.show{display:block}
.av-placeholder{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center}
.av-placeholder svg{width:24px;height:24px;fill:var(--ic)}
.av-placeholder span{font-size:.58rem;color:var(--ic)}
.av-letter{width:100%;height:100%;display:none;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;background:linear-gradient(135deg,#34c759,#667eea)}
.av-letter.show{display:-webkit-flex;display:flex}
.av-cam{position:absolute;bottom:-1px;left:-1px;width:28px;height:28px;background:linear-gradient(135deg,#34c759,#059669);border:3px solid var(--bg);border-radius:50%;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;z-index:2;cursor:pointer;transition:border-color .3s}
.av-cam svg{width:12px;height:12px;fill:#fff}

/* ======================================================
   ✅ فیکس 6: gap → margin در fields
   ====================================================== */
.fields{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column}
.field-box{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;-webkit-align-items:center;align-items:center;background:var(--field-bg);border:1.5px solid var(--field-border);border-radius:14px;padding:6px 15px;transition:border-color .2s,box-shadow .2s,background .3s;margin-bottom:12px}
.field-box:last-child{margin-bottom:0}
.field-box:focus-within{border-color:rgba(52,199,89,.5);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 0 0 3px rgba(52,199,89,.1)}
.field-box.has-error{border-color:rgba(255,59,48,.5);box-shadow:0 0 0 3px rgba(255,59,48,.08)}
.field-box.verified{border-color:rgba(52,199,89,.45);box-shadow:0 0 0 3px rgba(52,199,89,.06)}
.field-box.shake{animation:shake .4s ease}
.field-ic{width:20px;height:20px;stroke:var(--ic);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;-webkit-flex-shrink:0;flex-shrink:0;transition:stroke .2s}
.field-box:focus-within .field-ic,.uname-wrap:focus-within .field-ic{stroke:rgba(52,199,89,.7)}
.field-box.verified .field-ic,.uname-wrap.verified .field-ic{stroke:#34c759}
.field-box.has-error .field-ic,.uname-wrap.has-error .field-ic{stroke:rgba(255,59,48,.7)}

.fl-wrap{-webkit-flex:1;flex:1;position:relative;min-width:0}
.fl-wrap input{width:100%;background:transparent;border:none;outline:none;font-size:.95rem;font-family:inherit;color:var(--text);padding:14px 0 6px;transition:color .3s}
.fl-wrap input::placeholder{color:transparent}
.fl-wrap label{position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:.88rem;color:var(--label);pointer-events:none;transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap}
.fl-wrap.fl-up label{top:4px;transform:translateY(0);font-size:.65rem;color:rgba(52,199,89,.7);font-weight:600;letter-spacing:.3px}
.field-box.has-error .fl-wrap.fl-up label{color:rgba(255,69,58,.7)}
.fl-wrap input[type=tel]{direction:ltr;text-align:left;font-variant-numeric:tabular-nums;letter-spacing:.4px}
.msg-err{-webkit-flex-basis:100%;flex-basis:100%;font-size:.72rem;margin-top:4px;font-weight:500;color:#ff453a;display:none}
.msg-err.show{display:block}

.uname-wrap{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;-webkit-align-items:center;align-items:center;background:var(--field-bg);border:1.5px solid var(--field-border);border-radius:14px;padding:6px 15px;transition:border-color .2s,box-shadow .2s,background .3s;margin-bottom:12px}
.uname-wrap:focus-within{border-color:rgba(52,199,89,.5);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 0 0 3px rgba(52,199,89,.1)}
.uname-wrap.has-error{border-color:rgba(255,59,48,.5);box-shadow:0 0 0 3px rgba(255,59,48,.08)}
.uname-wrap.verified{border-color:rgba(52,199,89,.45);box-shadow:0 0 0 3px rgba(52,199,89,.06)}
.uname-wrap.shake{animation:shake .4s ease}
.uname-wrap .fl-wrap input{direction:ltr;text-align:left}
.uname-status{width:20px;height:20px;-webkit-flex-shrink:0;flex-shrink:0;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;opacity:0;transition:opacity .2s}
.uname-status.show{opacity:1}
.uname-status svg{width:16px;height:16px;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.uname-status.ok svg{stroke:#34c759}
.uname-status.err svg{stroke:#ff453a}
.uname-msg{-webkit-flex-basis:100%;flex-basis:100%;font-size:.72rem;margin-top:4px;font-weight:500;display:none;padding:0 2px}
.uname-msg.show{display:block}
.uname-msg.error{color:#ff453a}
.uname-msg.success{color:#34c759}
.uname-preview{-webkit-flex-basis:100%;flex-basis:100%;display:none;-webkit-align-items:center;align-items:center;margin-top:8px;padding:8px 12px;background:var(--uname-bg);border:1px solid var(--uname-border);border-radius:10px;direction:ltr;-webkit-justify-content:flex-start;justify-content:flex-start;cursor:pointer;transition:background .2s}
.uname-preview.show{display:-webkit-flex;display:flex}
.uname-preview:hover{background:rgba(52,199,89,.1)}
.uname-preview-at{font-size:.88rem;color:#34c759;font-weight:700}
.uname-preview-val{font-size:.88rem;color:var(--text-muted);font-weight:400}
.uname-counter{-webkit-flex-basis:100%;flex-basis:100%;font-size:.7rem;color:var(--counter);text-align:left;direction:ltr;margin-top:4px}

.terms{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;padding:12px 14px;background:var(--terms-bg);border-radius:14px;border:1px solid var(--terms-border);cursor:pointer;transition:all .2s;margin-bottom:12px}
.terms:hover{background:var(--badge-hover)}
.terms-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--field-border);-webkit-flex-shrink:0;flex-shrink:0;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;transition:all .2s;margin-left:10px}
.terms-check.on{background:#34c759;border-color:#34c759;animation:checkPop .3s ease}
.terms-check svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:3;opacity:0;transform:scale(0);transition:all .2s}
.terms-check.on svg{opacity:1;transform:scale(1)}
.terms-txt{font-size:.78rem;color:var(--text-muted);line-height:1.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.terms-txt a{color:#34c759;text-decoration:none;font-weight:600}

.btn-main{width:100%;padding:16px;background:linear-gradient(135deg,#34c759,#059669);color:#fff;border:none;border-radius:28px;font-family:inherit;font-weight:700;font-size:.95rem;cursor:pointer;transition:transform .2s;position:relative;overflow:hidden;letter-spacing:.2px;box-shadow:0 8px 24px rgba(52,199,89,.25),inset 0 1px 0 rgba(255,255,255,.12)}
.btn-main::after{content:'';position:absolute;top:0;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:shine 2s ease-in-out infinite;transform:skewX(-15deg)}
.btn-main:active{transform:scale(.97)}
.btn-main:disabled{opacity:.25;cursor:not-allowed;transform:none}
.btn-main:disabled::after{display:none}
.btn-main:disabled.pulse{animation:none}

/* ✅ فیکس 7: inset → top/right/bottom/left در loader */
.loader{position:fixed;top:0;right:0;bottom:0;left:0;z-index:100;display:none;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;-webkit-flex-direction:column;flex-direction:column;background:var(--loader-bg);overflow:hidden;transition:background .3s}
.loader.show{display:-webkit-flex;display:flex}
.ld-icon{position:relative;width:78px;height:78px;margin-bottom:18px}
.ld-ring{position:absolute;border-radius:50%;border:2px solid transparent;-webkit-will-change:transform;will-change:transform}
.ld-ring.a{top:-12px;right:-12px;bottom:-12px;left:-12px;border-top-color:var(--ld-ring-a1);border-right-color:var(--ld-ring-a2);animation:ringS 3s linear infinite}
.ld-ring.b{top:-22px;right:-22px;bottom:-22px;left:-22px;border-bottom-color:var(--ld-ring-b1);border-left-color:var(--ld-ring-b2);animation:ringS 4s linear infinite reverse}
.ld-ring.c{top:-32px;right:-32px;bottom:-32px;left:-32px;border-top-color:var(--ld-ring-c1);border-right-color:var(--ld-ring-c2);animation:ringS 5s linear infinite}
.ld-img{width:78px;height:78px;overflow:hidden;position:relative;z-index:2;animation:float 3s ease-in-out infinite}
.ld-img img{width:100%;height:100%;object-fit:contain;display:block}
.ld-title{color:var(--text);font-size:.9rem;font-weight:600;margin-bottom:4px;animation:up .4s ease .3s both}
.ld-sub{color:var(--loader-sub);font-size:.72rem;animation:up .4s ease .5s both;margin-bottom:18px}
.ld-prog{width:140px;height:3px;background:var(--loader-bar-bg);border-radius:3px;overflow:hidden;animation:up .4s ease .7s both}
.ld-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#34c759,#667eea,#af52de);background-size:200% 100%;width:0;transition:width 2.5s cubic-bezier(.4,0,.2,1)}
.ld-dots{display:-webkit-flex;display:flex;margin-top:14px;animation:up .4s ease .9s both}
.ld-dots span{width:5px;height:5px;border-radius:50%;background:var(--dot-bg);animation:dotB 1.4s ease-in-out infinite;margin:0 2px}
.ld-dots span:nth-child(2){animation-delay:.2s}
.ld-dots span:nth-child(3){animation-delay:.4s}

.toast{position:fixed;top:16px;left:50%;transform:translate(-50%,-130%);padding:12px 20px;border-radius:16px;font-size:.82rem;font-weight:600;z-index:200;pointer-events:none;transition:all .35s cubic-bezier(.68,-.55,.265,1.55);opacity:0;box-shadow:0 6px 20px rgba(0,0,0,.2)}
.toast.show{transform:translate(-50%,0);opacity:1}
.toast.s{background:#34c759;color:#fff}
.toast.e{background:#ff453a;color:#fff}

/* ✅ فیکس: جلوگیری از overflow در WebView */
html,body{overflow-x:hidden;width:100%}

/* ✅ فیکس: اندازه تصاویر در صفحه‌های کوچک */
@media(max-width:380px){
  .card-inner{padding:18px 14px}
  .card-hdr-txt h1{font-size:1rem}
  .atr-badge{font-size:.65rem;padding:0 10px;height:28px}
}
</style>
</head>
<body>

  <!-- ✅ فیکس 8: onerror برای تصویر -->
  <img src="https://i.ibb.co/TMgrGFTQ/1234.png" alt="" onerror="this.style.display='none';this.parentElement.innerHTML='<div style=\'width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,#34c759,#667eea);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;font-weight:800\'>M</div>'">

<div class="atr-badge badge-blue"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(102,126,234,.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>امن و خصوصی</div>
<div class="atr-badge badge-green"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(52,199,89,.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>رایگان</div>
</div>

<div class="av-sec">
<div class="av-wrap" id="avBox">
<div class="av-ring"></div>
<div class="av-circle">
<div class="av-placeholder" id="avPh"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>عکس</span></div>

  <img src="https://i.ibb.co/TMgrGFTQ/1234.png" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%2334c759%22 width=%22100%22 height=%22100%22 rx=%2220%22/><text x=%2250%22 y=%2265%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2248%22 font-weight=%22bold%22>M</text></svg>'">
</div></div>

</div>

<script>
function el(id){return document.getElementById(id)}

/* ===== تم ===== */
(function(){
var saved=localStorage.getItem('theme');
if(saved==='light'){document.documentElement.classList.add('light')}
el('themeToggle').addEventListener('click',function(){
var isLight=document.documentElement.classList.toggle('light');
localStorage.setItem('theme',isLight?'light':'dark');
document.querySelector('meta[name="theme-color"]').setAttribute('content',isLight?'#f5f5f7':'#06080f');
playClick();
});
})();

/* ===== کیبورد ===== */
(function(){
  var vp=window.visualViewport;
  if(vp){
    vp.addEventListener('resize',function(){
      var kh=window.innerHeight-vp.height;
      document.body.style.paddingBottom=kh>50?kh+'px':'';
    });
  }
  /* ✅ فیکس: fallback اگر visualViewport نباشد */
  if(!vp){
    window.addEventListener('resize',function(){
      document.body.style.paddingBottom='';
    });
  }
})();

/* ===== تایپ ===== */
(function(){var text='به جمع ما بپیوندید';var i=0;var tw=el('typewriter');var cur=el('cursor');function type(){if(i<text.length){tw.textContent+=text.charAt(i);i++;setTimeout(type,80)}else{setTimeout(function(){cur.style.display='none'},1500)}}setTimeout(type,300)})();

/* ===== زیرنویس ===== */
(function(){var subs=['حساب کاربری بسازید و شروع کنید','رایگان، امن و کاملاً خصوصی','به جمع هزاران کاربر بپیوندید'];var idx=0;var sub=el('rotatingSub');setInterval(function(){sub.style.opacity='0';sub.style.transform='translateY(-6px)';setTimeout(function(){idx=(idx+1)%subs.length;sub.textContent=subs[idx];sub.style.opacity='1';sub.style.transform='translateY(0)'},300)},4000)})();

/* ===== آنلاین ===== */
(function(){var c=247;var e=el('onlineCount');function tp(n){return String(n).replace(/0/g,'۰').replace(/1/g,'۱').replace(/2/g,'۲').replace(/3/g,'۳').replace(/4/g,'۴').replace(/5/g,'۵').replace(/6/g,'۶').replace(/7/g,'۷').replace(/8/g,'۸').replace(/9/g,'۹')};e.textContent=tp(c);setInterval(function(){c+=Math.floor(Math.random()*5)-2;if(c<200)c=200;if(c>350)c=350;e.textContent=tp(c)},4000)})();

/* ===== صدا ===== */
var audioCtx=null;
function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)}catch(e){}}
function playClick(){
  try{
    initAudio();
    if(!audioCtx)return;
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=800;o.type='sine';
    g.gain.setValueAtTime(.05,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.08);
    o.start();o.stop(audioCtx.currentTime+.08);
  }catch(e){}
}
function playError(){
  try{
    initAudio();
    if(!audioCtx)return;
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=250;o.type='square';
    g.gain.setValueAtTime(.04,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.2);
    o.start();o.stop(audioCtx.currentTime+.2);
  }catch(e){}
}
function playSuccess(){
  try{
    initAudio();
    if(!audioCtx)return;
    [[523,.1],[659,.1],[784,.15],[1047,.25]].forEach(function(n,i){
      var o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);
      o.frequency.value=n[0];o.type='sine';
      var t=audioCtx.currentTime+i*.12;
      g.gain.setValueAtTime(.07,t);
      g.gain.exponentialRampToValueAtTime(.001,t+n[1]);
      o.start(t);o.stop(t+n[1]);
    });
  }catch(e){}
}

/* ===== لرزش ===== */
function shakeField(box){box.classList.remove('shake');void box.offsetWidth;box.classList.add('shake')}

/* ===== لیبل شناور ===== */
function updateFloating(){var ws=document.querySelectorAll('.fl-wrap');for(var i=0;i<ws.length;i++){var inp=ws[i].querySelector('input');if(inp&&(inp.value.trim().length>0||inp===document.activeElement)){ws[i].classList.add('fl-up')}else{ws[i].classList.remove('fl-up')}}}

/* ===== ذرات ===== */
(function(){var c=el('px'),t=['a','b','c'];for(var i=0;i<20;i++){var d=document.createElement('div');d.className='pp '+t[i%3];d.style.left=Math.random()*100+'%';d.style.top=(30+Math.random()*70)+'%';d.style.animationDelay=(Math.random()*5)+'s';c.appendChild(d)}})();

/* ===== انیمیشن ورود ===== */
(function(){var f=el('wrap').querySelectorAll('.field-box,.uname-wrap,.terms');for(var i=0;i<f.length;i++){f[i].style.opacity='0';f[i].style.animation='up .4s ease '+(.3+.06*i)+'s forwards'}})();

/* ===== آواتار ===== */
var hasAvatar=false;
el('avBox').addEventListener('click',function(){el('avIn').click();playClick()});
el('avCam').addEventListener('click',function(e){e.stopPropagation();el('avIn').click();playClick()});
el('avIn').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){
  /* ✅ فیکس: محدود کردن اندازه ذخیره آواتار در localStorage */
  var img=new Image();
  img.onload=function(){
    var canvas=document.createElement('canvas');
    var maxSize=200;
    var w=img.width,h=img.height;
    if(w>maxSize||h>maxSize){
      if(w>h){h=Math.round(h*maxSize/w);w=maxSize}else{w=Math.round(w*maxSize/h);h=maxSize}
    }
    canvas.width=w;canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    var dataURL=canvas.toDataURL('image/jpeg',0.7);
    el('avImg').src=dataURL;
    el('avImg').classList.add('show');
    el('avPh').style.display='none';
    el('avLetter').classList.remove('show');
    hasAvatar=true;
    try{localStorage.setItem('uav',dataURL)}catch(ex){}
  };
  img.src=ev.target.result;
};r.readAsDataURL(f)});
function updateLetter(){if(hasAvatar)return;var n=el('iName').value.trim();if(n.length>0){el('avLetter').textContent=n.charAt(0).toUpperCase();el('avLetter').classList.add('show');el('avPh').style.display='none'}else{el('avLetter').classList.remove('show');el('avPh').style.display='flex'}}

/* ===== کپی ===== */
el('atPreview').addEventListener('click',function(){
  var u=el('atVal').textContent;if(!u)return;
  var t='@'+u;
  /* ✅ فیکس: fallback برای WebView بدون clipboard API */
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(t).then(function(){toast('کپی شد!','s')}).catch(function(){
        fallbackCopy(t);
      });
    }else{
      fallbackCopy(t);
    }
  }catch(ex){
    fallbackCopy(t);
  }
  playClick();
});
function fallbackCopy(text){
  try{
    var ta=document.createElement('textarea');
    ta.value=text;
    ta.style.position='fixed';
    ta.style.left='-9999px';
    ta.style.top='-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0,ta.value.length);
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('کپی شد!','s');
  }catch(ex){
    toast('کپی نشد','e');
  }
}

/* ===== لیبل شناور رویداد ===== */
(function(){var inputs=document.querySelectorAll('.fl-wrap input');for(var i=0;i<inputs.length;i++){inputs[i].addEventListener('focus',updateFloating);inputs[i].addEventListener('blur',updateFloating);inputs[i].addEventListener('input',updateFloating)}})();

/* ===== ذخیره خودکار ===== */
var takenNames=['admin','user','test','sara','ali','mohammad','reza','mehdi','hossein','fateme','zahra','maryam','matcha'];
var termsOK=false,unameTimer=null,prevBtnState=false;

function saveForm(){
  try{
    localStorage.setItem('draft_name',el('iName').value);
    localStorage.setItem('draft_phone',el('iPhone').value);
    localStorage.setItem('draft_uname',el('iUname').value);
  }catch(e){}
}
function loadForm(){
  try{
    var dn=localStorage.getItem('draft_name'),dp=localStorage.getItem('draft_phone'),du=localStorage.getItem('draft_uname');
    if(dn)el('iName').value=dn;
    if(dp)el('iPhone').value=dp;
    if(du)el('iUname').value=du;
    if(dn||dp||du){updateLetter();updateFloating();var v=el('iUname').value.trim();if(v.length>0){el('atPreview').classList.add('show');el('atVal').textContent=v}el('uCnt').textContent=el('iUname').value.length+'/20';validate()}
  }catch(e){}
}
loadForm();
function clearDraft(){try{localStorage.removeItem('draft_name');localStorage.removeItem('draft_phone');localStorage.removeItem('draft_uname')}catch(e){}}

/* ===== رویدادها ===== */
el('termsBox').addEventListener('click',function(){termsOK=!termsOK;el('termsChk').classList.toggle('on',termsOK);playClick();try{if(navigator.vibrate)navigator.vibrate(15)}catch(e){};validate()});
el('iName').addEventListener('input',function(){playClick();updateLetter();validate();saveForm()});
el('iPhone').addEventListener('input',function(){this.value=this.value.replace(/[^0-9]/g,'');playClick();validate();saveForm()});
el('iUname').addEventListener('input',function(){el('uCnt').textContent=this.value.length+'/20';var v=this.value.trim();if(v.length>0){el('atPreview').classList.add('show');el('atVal').textContent=v}else{el('atPreview').classList.remove('show')};playClick();validate();saveForm()});

/* ===== اعتبارسنجی ===== */
function validate(){
var ok=true;

var n=el('iName').value.trim(),fN=el('fName'),eN=el('eName');
fN.classList.remove('has-error');eN.classList.remove('show');
if(n.length>0&&n.length<2){eN.textContent='حداقل ۲ حرف';eN.classList.add('show');fN.classList.add('has-error');shakeField(fN);ok=false;playError()}

var ph=el('iPhone').value.trim(),fP=el('fPhone'),eP=el('ePhone');
fP.classList.remove('has-error','verified');eP.classList.remove('show');
if(ph.length>0&&!/^09/.test(ph)){eP.textContent='با ۰۹ شروع شود';eP.classList.add('show');fP.classList.add('has-error');shakeField(fP);ok=false}
else if(ph.length>0&&ph.length<11){eP.textContent='۱۱ رقم ('+ph.length+'/11)';eP.classList.add('show');fP.classList.add('has-error');ok=false}
else if(ph.length>=11&&!/^09\d{9}$/.test(ph)){eP.textContent='معتبر نیست';eP.classList.add('show');fP.classList.add('has-error');shakeField(fP);ok=false;playError()}
else if(/^09\d{9}$/.test(ph)){fP.classList.add('verified')}

var u=el('iUname').value.trim(),fU=el('fUname'),uMsg=el('uMsg'),uSt=el('uStatus');
fU.classList.remove('has-error','verified');uMsg.className='uname-msg';uMsg.textContent='';uSt.className='uname-status';
if(u.length===0){ok=false}
else if(u.length<3){uMsg.textContent='حداقل ۳ کاراکتر';uMsg.className='uname-msg error show';fU.classList.add('has-error');uSt.className='uname-status err show';uSt.innerHTML='<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';shakeField(fU);ok=false}
else if(!/^[a-z]/.test(u)){uMsg.textContent='با حرف کوچک شروع شود';uMsg.className='uname-msg error show';fU.classList.add('has-error');uSt.className='uname-status err show';uSt.innerHTML='<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';shakeField(fU);ok=false}
else if(!/^[a-z][a-z0-9_]*$/.test(u)){uMsg.textContent='فقط حروف کوچک و _';uMsg.className='uname-msg error show';fU.classList.add('has-error');uSt.className='uname-status err show';uSt.innerHTML='<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';shakeField(fU);ok=false}
else if(u.length>=3){ok=false;clearTimeout(unameTimer);unameTimer=setTimeout(function(){
if(takenNames.indexOf(u.toLowerCase())>-1||u.toLowerCase()===(localStorage.getItem('reg_uname')||'')){
uMsg.textContent='این نام قبلاً گرفته شده';uMsg.className='uname-msg error show';fU.classList.add('has-error');
uSt.className='uname-status err show';uSt.innerHTML='<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
shakeField(fU);playError();
}else{
uMsg.textContent='نام کاربری در دسترس است';uMsg.className='uname-msg success show';fU.classList.add('verified');
uSt.className='uname-status ok show';uSt.innerHTML='<svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>';
updateLetter();
}
updateBtn();
},350)}

var p=0;if(n.length>=2)p+=25;if(/^09\d{9}$/.test(ph))p+=25;if(fU.classList.contains('verified'))p+=25;if(termsOK)p+=25;
el('progFill').style.width=p+'%';
updateBtn();
}

function updateBtn(){
var n=el('iName').value.trim(),ph=el('iPhone').value.trim(),u=el('iUname').value.trim();
var now=n.length>=2&&/^09\d{9}$/.test(ph)&&/^[a-z][a-z0-9_]{2,19}$/.test(u)&&el('fUname').classList.contains('verified')&&termsOK;
el('btnReg').disabled=!now;
if(now&&!prevBtnState){el('btnReg').classList.remove('pulse');void el('btnReg').offsetWidth;el('btnReg').classList.add('pulse')}
if(!now)el('btnReg').classList.remove('pulse');
prevBtnState=now;
}

/* ===== ثبت‌نام ===== */
el('btnReg').addEventListener('click',function(){
var n=el('iName').value.trim(),ph=el('iPhone').value.trim(),u=el('iUname').value.trim();
if(!n||!/^09\d{9}$/.test(ph)||!/^[a-z][a-z0-9_]{2,19}$/.test(u)||!el('fUname').classList.contains('verified')||!termsOK){
toast('اطلاعات ناقص','e');playError();return;
}
playSuccess();
clearDraft();

try{
  localStorage.setItem('ufn',n);
  localStorage.setItem('uph',ph);
  localStorage.setItem('uun',u);
  localStorage.setItem('uln','');
  localStorage.setItem('reg_uname',u);
  if(!hasAvatar){localStorage.setItem('uav_letter',n.charAt(0).toUpperCase())}
  localStorage.setItem('regDone','true');
}catch(e){}

el('wrap').style.display='none';
el('progFill').style.width='100%';
el('loader').classList.add('show');

var msgs=['در حال آماده‌سازی...','ساخت حساب...','بارگذاری اطلاعات...','تقریباً آماده...','خوش آمدید!'];
var mi=0;
var msgI=setInterval(function(){mi++;if(mi<msgs.length)el('ldSub').textContent=msgs[mi];else clearInterval(msgI)},500);

setTimeout(function(){el('ldBar').style.width='100%'},100);
setTimeout(function(){toast('ثبت‌نام موفق!','s');clearInterval(msgI)},2600);

/* ✅ فیکس: مسیر قابل تنظیم برای WebView */
setTimeout(function(){
  /* اگر داخل WebView هست، به صفحه اصلی بره */
  var target = 'index.html';
  try{
    if(window.Android && window.Android.goToMain){
      window.Android.goToMain();
    } else {
      window.location.replace(target);
    }
  }catch(e){
    window.location.replace(target);
  }
},3200);
});

/* ===== Enter ===== */
document.addEventListener('keydown',function(e){
if(e.key==='Enter'){e.preventDefault();
var inputs=el('wrap').querySelectorAll('input');var arr=[];
for(var i=0;i<inputs.length;i++)arr.push(inputs[i]);
var idx=arr.indexOf(document.activeElement);
if(idx>-1&&idx<arr.length-1)arr[idx+1].focus();
}
});

/* ===== Toast ===== */
function toast(msg,type){
var t=el('toast');el('toastTx').textContent=msg;
t.className='toast '+(type||'s');
setTimeout(function(){t.classList.add('show')},50);
setTimeout(function(){t.classList.remove('show')},2500);
}

/* ✅ فیکس: اطمینان از بارگذاری فونت */
document.fonts.ready.then(function(){
  document.body.style.fontFamily="'Vazirmatn','Tahoma','Arial',sans-serif";
}).catch(function(){});
</script>
