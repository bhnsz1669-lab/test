<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#06080f">
<meta name="description" content="Matcha - ثبت‌نام سریع و امن">
<title>Matcha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#06080f;--bg2:rgba(10,15,28,.7);
--text:rgba(255,255,255,.92);--text-muted:rgba(255,255,255,.45);--text-dim:rgba(255,255,255,.35);
--field-bg:rgba(255,255,255,.08);--field-border:rgba(255,255,255,.15);
--label:rgba(255,255,255,.5);
--ic:rgba(255,255,255,.35);--terms-bg:rgba(255,255,255,.05);
--terms-border:rgba(255,255,255,.08);
--badge-bg:rgba(255,255,255,.05);--badge-border:rgba(255,255,255,.08);
--badge-text:rgba(255,255,255,.55);
--hdr-p:rgba(255,255,255,.45);
--g1:rgba(52,199,89,.15);--g2:rgba(102,126,234,.12);--g3:rgba(175,82,222,.1);
--prog-bg:rgba(255,255,255,.05);
}
body{
font-family:'Vazirmatn','Tahoma','Arial',sans-serif;
color:var(--text);min-height:100vh;
overflow-x:hidden;-webkit-font-smoothing:antialiased;
background:var(--bg);
}

/* ===== انیمیشن‌ها ===== */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes borderGlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes badgePop{0%{opacity:0;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}
@keyframes shine{0%{left:-100%}100%{left:200%}}
@keyframes btnPulse{0%{box-shadow:0 8px 24px rgba(52,199,89,.25),inset 0 1px 0 rgba(255,255,255,.12),0 0 0 0 rgba(52,199,89,.4)}70%{box-shadow:0 8px 24px rgba(52,199,89,.25),inset 0 1px 0 rgba(255,255,255,.12),0 0 0 10px rgba(52,199,89,0)}100%{box-shadow:0 8px 24px rgba(52,199,89,.25),inset 0 1px 0 rgba(255,255,255,.12),0 0 0 0 rgba(52,199,89,0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
@keyframes blink{50%{opacity:0}}

/* ===== پس‌زمینه ===== */
.bg{position:fixed;top:0;right:0;bottom:0;left:0;z-index:0;background:var(--bg)}
.bg-g1{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,var(--g1),transparent 70%);top:8%;left:5%;animation:float 8s ease-in-out infinite}
.bg-g2{position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,var(--g2),transparent 70%);bottom:15%;right:0;animation:float 10s ease-in-out infinite 2s}
.bg-g3{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,var(--g3),transparent 70%);top:45%;left:45%;animation:float 12s ease-in-out infinite 4s}

/* ===== نوار پیشرفت ===== */
.prog{position:fixed;top:0;left:0;right:0;height:3px;background:var(--prog-bg);z-index:1000}
.prog-fill{height:100%;background:linear-gradient(90deg,#34c759,#667eea,#34c759);background-size:200% 100%;width:0;transition:width .4s ease;border-radius:0 2px 2px 0}

/* ===== رپر ===== */
.wrap{position:relative;z-index:1;max-width:380px;margin:0 auto;padding:24px 18px 24px}

/* ===== کارت ===== */
.card-glow{position:relative;padding:2px;border-radius:26px;background:linear-gradient(135deg,rgba(52,199,89,.2),rgba(102,126,234,.15),rgba(175,82,222,.12),rgba(52,199,89,.2));background-size:300% 300%;animation:borderGlow 6s ease infinite,cardIn .6s ease .15s both}
.card-inner{background:var(--bg2);border-radius:24px;padding:22px 18px;box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);position:relative}

/* ===== هدر کارت ===== */
.card-hdr{display:flex;align-items:center;margin-bottom:20px;animation:slideRight .5s ease both}
.card-hdr-ic{position:relative;width:50px;height:50px;flex-shrink:0;margin-left:14px;animation:float 4s ease-in-out infinite}
.card-hdr-img{width:50px;height:50px;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,#34c759,#667eea);display:flex;align-items:center;justify-content:center}
.card-hdr-img span{font-size:1.5rem;font-weight:800;color:#fff}
.card-hdr-txt{min-width:0;flex:1}
.card-hdr-txt h1{font-size:1.1rem;font-weight:800;line-height:1.4;margin-bottom:2px;background:linear-gradient(135deg,var(--text),var(--text-muted));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card-hdr-txt p{font-size:.76rem;color:var(--hdr-p);line-height:1.5}

/* ===== بج‌ها ===== */
.attract{display:flex;justify-content:center;flex-wrap:wrap;margin-bottom:16px;animation:up .4s ease .1s both}
.atr-badge{display:inline-flex;align-items:center;height:32px;padding:0 14px;background:var(--badge-bg);border:1px solid var(--badge-border);border-radius:20px;font-size:.7rem;color:var(--badge-text);font-weight:500;animation:badgePop .4s ease both;white-space:nowrap;margin:4px}
.atr-badge:nth-child(1){animation-delay:.15s}
.atr-badge:nth-child(2){animation-delay:.25s}
.atr-badge:nth-child(3){animation-delay:.35s}
.atr-badge svg{width:14px;height:14px;flex-shrink:0}
.online-dot{width:6px;height:6px;border-radius:50%;background:#34c759;flex-shrink:0;animation:pulse 2s ease-in-out infinite}
.online-count{color:#34c759;font-weight:700}

/* ===== آواتار ===== */
.av-sec{display:flex;flex-direction:column;align-items:center;margin-bottom:18px}
.av-wrap{position:relative;width:90px;height:90px}
.av-ring{position:absolute;top:-3px;right:-3px;bottom:-3px;left:-3px;border-radius:50%;background:conic-gradient(from 0deg,#34c759,#667eea,#af52de,#f093fb,#34c759);background-size:100% 100%;animation:grad 4s ease infinite;opacity:.3}
.av-circle{width:90px;height:90px;border-radius:50%;overflow:hidden;background:var(--field-bg);position:relative;z-index:1;display:flex;align-items:center;justify-content:center;border:3px solid var(--bg)}
.av-letter{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;background:linear-gradient(135deg,#34c759,#667eea)}
.av-placeholder{display:flex;flex-direction:column;align-items:center;gap:2px}
.av-placeholder svg{width:24px;height:24px;fill:var(--ic)}
.av-placeholder span{font-size:.58rem;color:var(--ic)}

/* ===== فیلدها ===== */
.fields{display:flex;flex-direction:column;gap:12px}

.field-box{
display:flex;flex-wrap:wrap;align-items:center;
background:var(--field-bg);border:1.5px solid var(--field-border);
border-radius:14px;padding:6px 15px;
transition:border-color .2s,box-shadow .2s;
}
.field-box:focus-within{border-color:rgba(52,199,89,.5);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 0 0 3px rgba(52,199,89,.1)}
.field-ic{width:20px;height:20px;stroke:var(--ic);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;transition:stroke .2s}
.field-box:focus-within .field-ic{stroke:rgba(52,199,89,.7)}

.fl-wrap{flex:1;position:relative;min-width:0}
.fl-wrap input{
width:100%;background:transparent;border:none;outline:none;
font-size:.95rem;font-family:inherit;color:var(--text);
padding:14px 0 6px;
}
.fl-wrap input::placeholder{color:transparent}
.fl-wrap label{
position:absolute;right:0;top:50%;transform:translateY(-50%);
font-size:.88rem;color:var(--label);pointer-events:none;
transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap;
}
/* ✅ لیبل شناور با CSS خالص */
.fl-wrap input:focus + label,
.fl-wrap input:not(:placeholder-shown) + label{
top:4px;transform:translateY(0);font-size:.65rem;
color:rgba(52,199,89,.7);font-weight:600;letter-spacing:.3px;
}

.fl-wrap input[type=tel]{direction:ltr;text-align:left;font-variant-numeric:tabular-nums;letter-spacing:.4px}

/* ===== نام کاربری ===== */
.uname-wrap{
display:flex;flex-wrap:wrap;align-items:center;
background:var(--field-bg);border:1.5px solid var(--field-border);
border-radius:14px;padding:6px 15px;
transition:border-color .2s,box-shadow .2s;
}
.uname-wrap:focus-within{border-color:rgba(52,199,89,.5);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 0 0 3px rgba(52,199,89,.1)}
.uname-wrap .fl-wrap input{direction:ltr;text-align:left}
.uname-counter{flex-basis:100%;font-size:.7rem;color:rgba(255,255,255,.25);text-align:left;direction:ltr;margin-top:4px}
.uname-preview{flex-basis:100%;display:flex;align-items:center;margin-top:8px;padding:8px 12px;background:rgba(52,199,89,.04);border:1px solid rgba(52,199,89,.08);border-radius:10px;direction:ltr;justify-content:flex-start}
.uname-preview-at{font-size:.88rem;color:#34c759;font-weight:700}
.uname-preview-val{font-size:.88rem;color:var(--text-muted);font-weight:400}

/* ===== قوانین ===== */
.terms{
display:flex;align-items:center;
padding:12px 14px;background:var(--terms-bg);
border-radius:14px;border:1px solid var(--terms-border);
cursor:pointer;
}
.terms input[type=checkbox]{display:none}
.terms-check{
width:22px;height:22px;border-radius:7px;
border:2px solid var(--field-border);flex-shrink:0;
display:flex;align-items:center;justify-content:center;
transition:all .2s;margin-left:10px;
}
/* ✅ چک‌باکس با CSS خالص */
.terms input:checked + .terms-check{
background:#34c759;border-color:#34c759;
}
.terms-check svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:3;opacity:0;transform:scale(0);transition:all .2s}
.terms input:checked + .terms-check svg{opacity:1;transform:scale(1)}
.terms-txt{font-size:.78rem;color:var(--text-muted);line-height:1.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.terms-txt a{color:#34c759;text-decoration:none;font-weight:600}

/* ===== دکمه ===== */
.btn-main{
width:100%;padding:16px;
background:linear-gradient(135deg,#34c759,#059669);
color:#fff;border:none;border-radius:28px;
font-family:inherit;font-weight:700;font-size:.95rem;
cursor:pointer;position:relative;overflow:hidden;
letter-spacing:.2px;margin-top:12px;
box-shadow:0 8px 24px rgba(52,199,89,.25),inset 0 1px 0 rgba(255,255,255,.12);
animation:btnPulse 1.5s ease-in-out infinite;
display:block;text-align:center;text-decoration:none;
}
.btn-main::after{content:'';position:absolute;top:0;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:shine 2s ease-in-out infinite;transform:skewX(-15deg)}
.btn-main:active{transform:scale(.97)}

/* ===== انیمیشن ورود ===== */
.field-box:nth-child(1){animation:up .4s ease .3s both}
.field-box:nth-child(2){animation:up .4s ease .36s both}
.field-box:nth-child(3){animation:up .4s ease .42s both}
.field-box:nth-child(4){animation:up .4s ease .48s both}

/* ===== ریسپانسیو ===== */
@media(max-width:380px){
.card-inner{padding:18px 14px}
.card-hdr-txt h1{font-size:1rem}
.atr-badge{font-size:.65rem;padding:0 10px;height:28px}
}
</style>
</head>
<body>

<!-- پس‌زمینه -->
<div class="bg">
<div class="bg-g1"></div>
<div class="bg-g2"></div>
<div class="bg-g3"></div>
</div>

<!-- نوار پیشرفت -->
<div class="prog"><div class="prog-fill" style="width:50%"></div></div>

<!-- محتوا -->
<div class="wrap">
<div class="card-glow"><div class="card-inner">

<!-- هدر -->
<div class="card-hdr">
<div class="card-hdr-ic">
<div class="card-hdr-img"><span>M</span></div>
</div>
<div class="card-hdr-txt">
<h1>به جمع ما بپیوندید</h1>
<p>حساب کاربری بسازید و شروع کنید</p>
</div>
</div>

<!-- بج‌ها -->
<div class="attract">
<div class="atr-badge badge-green">
<span class="online-dot"></span>
<span class="online-count">۲۴۷</span> آنلاین
</div>
<div class="atr-badge badge-blue">
<svg viewBox="0 0 24 24" fill="none" stroke="rgba(102,126,234,.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
امن و خصوصی
</div>
<div class="atr-badge badge-green">
<svg viewBox="0 0 24 24" fill="none" stroke="rgba(52,199,89,.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
رایگان
</div>
</div>

<!-- آواتار -->
<div class="av-sec">
<div class="av-wrap">
<div class="av-ring"></div>
<div class="av-circle">
<div class="av-letter">M</div>
</div>
</div>
</div>

<!-- فیلدها -->
<div class="fields">

<!-- نام -->
<div class="field-box">
<svg class="field-ic" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
<div class="fl-wrap">
<input type="text" name="name" autocomplete="off" maxlength="30" placeholder=" ">
<label>نام</label>
</div>
</div>

<!-- شماره تلفن -->
<div class="field-box">
<svg class="field-ic" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
<div class="fl-wrap">
<input type="tel" name="phone" maxlength="11" inputmode="numeric" autocomplete="off" placeholder=" ">
<label>شماره تلفن</label>
</div>
</div>

<!-- نام کاربری -->
<div class="field-box">
<svg class="field-ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 006 0v-1a10 10 0 10-3.92 7.94"/></svg>
<div class="fl-wrap">
<input type="text" name="username" autocomplete="off" maxlength="20" dir="ltr" placeholder=" ">
<label>نام کاربری</label>
</div>
<div class="uname-counter">0/20</div>
</div>

<!-- قوانین -->
<div class="terms">
<input type="checkbox" id="termsChk">
<label class="terms-check" for="termsChk">
<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
</label>
<div class="terms-txt">
<a href="#">شرایط استفاده</a> و <a href="#">سیاست حریم خصوصی</a> را می‌پذیرم
</div>
</div>

</div>

<!-- دکمه ثبت‌نام -->
<a href="index.html" class="btn-main">ثبت‌نام</a>

</div></div>
</div>

</body>
</html>
