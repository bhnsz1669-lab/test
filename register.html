<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Matcha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

.theme-scope{
--bg:#06080f;--bg2:rgba(10,15,28,.7);
--text:rgba(255,255,255,.92);--text-muted:rgba(255,255,255,.45);
--field-bg:rgba(255,255,255,.08);--field-border:rgba(255,255,255,.15);
--label:rgba(255,255,255,.5);--ic:rgba(255,255,255,.35);
--terms-bg:rgba(255,255,255,.05);--terms-border:rgba(255,255,255,.08);
--badge-bg:rgba(255,255,255,.05);--badge-border:rgba(255,255,255,.08);
--badge-text:rgba(255,255,255,.55);--badge-hover:rgba(255,255,255,.1);
--badge-hover-border:rgba(255,255,255,.18);--badge-hover-text:rgba(255,255,255,.8);
--hdr-p:rgba(255,255,255,.45);--prog-bg:rgba(255,255,255,.05);
--g1:rgba(52,199,89,.15);--g2:rgba(102,126,234,.12);--g3:rgba(175,82,222,.1);
--toggle-bg:rgba(255,255,255,.06);--toggle-border:rgba(255,255,255,.08);
--err-bg:rgba(255,59,48,.08);--ok-bg:rgba(52,199,89,.06);
}
#themeChk:checked~.theme-scope{
--bg:#f5f5f7;--bg2:rgba(255,255,255,.82);
--text:rgba(0,0,0,.88);--text-muted:rgba(0,0,0,.5);
--field-bg:rgba(0,0,0,.03);--field-border:rgba(0,0,0,.1);
--label:rgba(0,0,0,.45);--ic:rgba(0,0,0,.25);
--terms-bg:rgba(0,0,0,.03);--terms-border:rgba(0,0,0,.06);
--badge-bg:rgba(0,0,0,.03);--badge-border:rgba(0,0,0,.06);
--badge-text:rgba(0,0,0,.5);--badge-hover:rgba(0,0,0,.05);
--badge-hover-border:rgba(0,0,0,.12);--badge-hover-text:rgba(0,0,0,.75);
--hdr-p:rgba(0,0,0,.4);--prog-bg:rgba(0,0,0,.05);
--g1:rgba(52,199,89,.08);--g2:rgba(102,126,234,.06);--g3:rgba(175,82,222,.05);
--toggle-bg:rgba(0,0,0,.05);--toggle-border:rgba(0,0,0,.08);
--err-bg:rgba(255,59,48,.06);--ok-bg:rgba(52,199,89,.05);
}
#themeChk:checked~.theme-scope .card-glow{filter:saturate(.6)}
#themeChk:checked~.theme-scope .card-inner{box-shadow:0 4px 24px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.5)}

body{font-family:'Vazirmatn','Tahoma','Arial',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;background:var(--bg)}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes shine{0%{left:-100%}100%{left:200%}}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes bGlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes cIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
@keyframes blink{50%{opacity:0}}
@keyframes bPop{0%{opacity:0;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}
@keyframes pShim{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes bPulse{0%{box-shadow:0 8px 24px rgba(52,199,89,.25),inset 0 1px 0 rgba(255,255,255,.12),0 0 0 0 rgba(52,199,89,.4)}70%{box-shadow:0 8px 24px rgba(52,199,89,.25),inset 0 1px 0 rgba(255,255,255,.12),0 0 0 10px rgba(52,199,89,0)}100%{box-shadow:0 8px 24px rgba(52,199,89,.25),inset 0 1px 0 rgba(255,255,255,.12),0 0 0 0 rgba(52,199,89,0)}}
@keyframes pF1{0%{transform:translate(0,0);opacity:0}15%{opacity:.7}85%{opacity:.7}100%{transform:translate(20px,-100px);opacity:0}}
@keyframes pF2{0%{transform:translate(0,0);opacity:0}15%{opacity:.6}85%{opacity:.6}100%{transform:translate(-25px,-90px);opacity:0}}
@keyframes pF3{0%{transform:translate(0,0);opacity:0}15%{opacity:.5}85%{opacity:.5}100%{transform:translate(15px,-110px);opacity:0}}
@keyframes typew{to{max-width:400px}}
@keyframes subC{0%,5%{opacity:0;transform:translateY(-8px)}8%,28%{opacity:1;transform:translateY(0)}33%,100%{opacity:0;transform:translateY(8px)}}
@keyframes cntC{0%,4%{opacity:0;transform:translateY(-100%)}6%,22%{opacity:1;transform:translateY(0)}24%,100%{opacity:0;transform:translateY(100%)}}
@keyframes checkP{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}

/* پس‌زمینه */
.bg{position:fixed;top:0;right:0;bottom:0;left:0;z-index:0;background:var(--bg);transition:background .3s}
.bg-g1{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,var(--g1),transparent 70%);top:8%;left:5%;animation:float 8s ease-in-out infinite}
.bg-g2{position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,var(--g2),transparent 70%);bottom:15%;right:0;animation:float 10s ease-in-out infinite 2s}
.bg-g3{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,var(--g3),transparent 70%);top:45%;left:45%;animation:float 12s ease-in-out infinite 4s}

.px{position:fixed;top:0;right:0;bottom:0;left:0;z-index:0;overflow:hidden;pointer-events:none}
.pp{position:absolute;border-radius:50%}
.pp.a{background:rgba(52,199,89,.5);width:3px;height:3px}
.pp.b{background:rgba(102,126,234,.4);width:2px;height:2px}
.pp.c{background:rgba(175,82,222,.35);width:2px;height:2px}
.pp:nth-child(3n+1){animation:pF1 6s ease-in-out infinite}
.pp:nth-child(3n+2){animation:pF2 7s ease-in-out infinite}
.pp:nth-child(3n){animation:pF3 8s ease-in-out infinite}

.prog{position:fixed;top:0;left:0;right:0;height:3px;background:var(--prog-bg);z-index:1000}
.prog-fill{height:100%;background:linear-gradient(90deg,#34c759,#667eea,#34c759);background-size:200% 100%;animation:pShim 2s linear infinite;width:100%}

/* تم */
#themeChk{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
.theme-toggle{position:fixed;top:14px;left:14px;z-index:50;width:40px;height:40px;border-radius:50%;background:var(--toggle-bg);border:1px solid var(--toggle-border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
.theme-toggle:hover{transform:scale(1.05)}
.theme-toggle:active{transform:scale(.95)}
.theme-toggle svg{width:18px;height:18px}
.ic-moon{display:block;fill:rgba(255,255,255,.5)}
.ic-sun{display:none;fill:rgba(0,0,0,.5)}
#themeChk:checked~.theme-toggle .ic-moon{display:none}
#themeChk:checked~.theme-toggle .ic-sun{display:block}

.wrap{position:relative;z-index:1;max-width:380px;margin:0 auto;padding:24px 18px}

/* کارت */
.card-glow{position:relative;padding:2px;border-radius:26px;background:linear-gradient(135deg,rgba(52,199,89,.2),rgba(102,126,234,.15),rgba(175,82,222,.12),rgba(52,199,89,.2));background-size:300% 300%;animation:bGlow 6s ease infinite,cIn .6s ease .15s both;transition:filter .3s}
.card-inner{background:var(--bg2);border-radius:24px;padding:22px 18px;box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);transition:background .3s}

/* هدر */
.card-hdr{display:flex;align-items:center;margin-bottom:20px;animation:slideR .5s ease both}
.card-hdr-ic{width:50px;height:50px;flex-shrink:0;margin-left:14px;animation:float 4s ease-in-out infinite}
.card-hdr-img{width:50px;height:50px;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,#34c759,#667eea);display:flex;align-items:center;justify-content:center}
.card-hdr-img span{font-size:1.5rem;font-weight:800;color:#fff}
.card-hdr-txt{min-width:0;flex:1}
.card-hdr-txt h1{font-size:1.1rem;font-weight:800;line-height:1.4;min-height:1.5em;background:linear-gradient(135deg,var(--text),var(--text-muted));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tw-wrap{display:inline-block;overflow:hidden;white-space:nowrap;max-width:0;animation:typew 2s steps(18,end) .3s forwards;vertical-align:bottom}
.tw-cursor{display:inline-block;width:2px;height:1.1em;background:#34c759;margin-right:4px;vertical-align:text-bottom;animation:blink 1s step-end infinite}

.rotating-subs{position:relative;height:1.5em;overflow:hidden;margin-top:2px}
.sub{position:absolute;top:0;right:0;left:0;font-size:.76rem;color:var(--hdr-p);line-height:1.5;opacity:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub.s1{animation:subC 12s ease infinite 0s}
.sub.s2{animation:subC 12s ease infinite 4s}
.sub.s3{animation:subC 12s ease infinite 8s}

/* بج‌ها */
.attract{display:flex;justify-content:center;flex-wrap:wrap;margin-bottom:16px;animation:up .4s ease .1s both}
.atr-badge{display:inline-flex;align-items:center;height:30px;padding:0 12px;background:var(--badge-bg);border:1px solid var(--badge-border);border-radius:20px;font-size:.65rem;color:var(--badge-text);font-weight:500;animation:bPop .4s ease both;white-space:nowrap;margin:3px;transition:all .25s}
.atr-badge:nth-child(1){animation-delay:.15s}
.atr-badge:nth-child(2){animation-delay:.25s}
.atr-badge:nth-child(3){animation-delay:.35s}
.atr-badge svg{width:13px;height:13px;flex-shrink:0}
.atr-badge:hover{background:var(--badge-hover);border-color:var(--badge-hover-border);color:var(--badge-hover-text)}
.online-dot{width:6px;height:6px;border-radius:50%;background:#34c759;flex-shrink:0;animation:pulse 2s ease-in-out infinite}

.cnt-rot{display:inline-block;position:relative;height:1.1em;width:1.8em;overflow:hidden;vertical-align:middle}
.cn{position:absolute;top:0;right:0;width:100%;text-align:center;opacity:0;color:#34c759;font-weight:700;font-size:inherit}
.cn:nth-child(1){animation:cntC 16s ease infinite 0s}
.cn:nth-child(2){animation:cntC 16s ease infinite 4s}
.cn:nth-child(3){animation:cntC 16s ease infinite 8s}
.cn:nth-child(4){animation:cntC 16s ease infinite 12s}

/* آواتار */
.av-sec{display:flex;flex-direction:column;align-items:center;margin-bottom:18px}
.av-wrap{position:relative;width:86px;height:86px}
.av-ring{position:absolute;top:-3px;right:-3px;bottom:-3px;left:-3px;border-radius:50%;background:conic-gradient(from 0deg,#34c759,#667eea,#af52de,#f093fb,#34c759);animation:grad 4s ease infinite;opacity:.3;transition:opacity .3s}
.av-wrap:hover .av-ring{opacity:.6}
.av-circle{width:86px;height:86px;border-radius:50%;overflow:hidden;background:var(--field-bg);position:relative;z-index:1;display:flex;align-items:center;justify-content:center;border:3px solid var(--bg);cursor:pointer;transition:box-shadow .3s}
.av-circle:hover{box-shadow:0 6px 20px rgba(52,199,89,.15)}
.av-letter{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;background:linear-gradient(135deg,#34c759,#667eea)}
.av-cam{position:absolute;bottom:-1px;left:-1px;width:26px;height:26px;background:linear-gradient(135deg,#34c759,#059669);border:3px solid var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:2;cursor:pointer;transition:transform .2s}
.av-cam:hover{transform:scale(1.1)}
.av-cam svg{width:11px;height:11px;fill:#fff}
#avIn{position:absolute;opacity:0;width:0;height:0;pointer-events:none}

/* فیلدها */
.fields{display:flex;flex-direction:column;gap:12px}
.field-box{display:flex;flex-wrap:wrap;align-items:center;background:var(--field-bg);border:1.5px solid var(--field-border);border-radius:14px;padding:6px 15px;transition:border-color .2s,box-shadow .2s}
.field-box:focus-within{border-color:rgba(52,199,89,.5);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 0 0 3px rgba(52,199,89,.1)}
.field-box.shake{animation:shake .4s ease}
.field-box.has-err{border-color:rgba(255,59,48,.5);box-shadow:0 0 0 3px var(--err-bg)}
.field-box.has-ok{border-color:rgba(52,199,89,.45);box-shadow:0 0 0 3px var(--ok-bg)}

.field-ic{width:20px;height:20px;stroke:var(--ic);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;transition:stroke .2s}
.field-box:focus-within .field-ic{stroke:rgba(52,199,89,.7)}
.field-box.has-ok .field-ic{stroke:#34c759}
.field-box.has-err .field-ic{stroke:rgba(255,59,48,.7)}

.fl-wrap{flex:1;position:relative;min-width:0}
.fl-wrap input{width:100%;background:transparent;border:none;outline:none;font-size:.92rem;font-family:inherit;color:var(--text);padding:14px 0 6px}
.fl-wrap input::placeholder{color:transparent}
.fl-wrap label{position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:.85rem;color:var(--label);pointer-events:none;transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap}
.fl-wrap input:focus+label,.fl-wrap input:not(:placeholder-shown)+label{top:4px;transform:translateY(0);font-size:.63rem;color:rgba(52,199,89,.7);font-weight:600;letter-spacing:.3px}
.field-box.has-err .fl-wrap input:focus+label,.field-box.has-err .fl-wrap input:not(:placeholder-shown)+label{color:rgba(255,69,58,.7)}
.fl-wrap input[type=tel]{direction:ltr;text-align:left;font-variant-numeric:tabular-nums;letter-spacing:.4px}

.msg-err{flex-basis:100%;font-size:.7rem;margin-top:3px;font-weight:500;color:#ff453a;display:none;padding:0 2px}
.msg-err.show{display:block}

/* نام کاربری */
.uname-wrap{display:flex;flex-wrap:wrap;align-items:center;background:var(--field-bg);border:1.5px solid var(--field-border);border-radius:14px;padding:6px 15px;transition:border-color .2s,box-shadow .2s}
.uname-wrap:focus-within{border-color:rgba(52,199,89,.5);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 0 0 3px rgba(52,199,89,.1)}
.uname-wrap.has-err{border-color:rgba(255,59,48,.5);box-shadow:0 0 0 3px var(--err-bg)}
.uname-wrap.has-ok{border-color:rgba(52,199,89,.45);box-shadow:0 0 0 3px var(--ok-bg)}
.uname-wrap.shake{animation:shake .4s ease}
.uname-wrap .fl-wrap input{direction:ltr;text-align:left}
.uname-status{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.uname-status.show{opacity:1}
.uname-status svg{width:16px;height:16px;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.uname-status.ok svg{stroke:#34c759}
.uname-status.err svg{stroke:#ff453a}
.uname-msg{flex-basis:100%;font-size:.7rem;margin-top:3px;font-weight:500;display:none;padding:0 2px}
.uname-msg.show{display:block}
.uname-msg.error{color:#ff453a}
.uname-msg.success{color:#34c759}
.uname-preview{flex-basis:100%;display:none;align-items:center;margin-top:8px;padding:8px 12px;background:rgba(52,199,89,.04);border:1px solid rgba(52,199,89,.08);border-radius:10px;direction:ltr;justify-content:flex-start;cursor:pointer;transition:background .2s}
.uname-preview.show{display:flex}
.uname-preview:hover{background:rgba(52,199,89,.1)}
.uname-preview-at{font-size:.85rem;color:#34c759;font-weight:700}
.uname-preview-val{font-size:.85rem;color:var(--text-muted);font-weight:400}
.uname-counter{flex-basis:100%;font-size:.68rem;color:rgba(255,255,255,.2);text-align:left;direction:ltr;margin-top:3px}
#themeChk:checked~.theme-scope .uname-counter{color:rgba(0,0,0,.2)}

/* قوانین */
.terms{display:flex;align-items:center;padding:10px 12px;background:var(--terms-bg);border-radius:14px;border:1px solid var(--terms-border);cursor:pointer;transition:all .2s;margin-top:2px}
.terms:hover{background:var(--badge-hover)}
.terms input[type=checkbox]{position:absolute;opacity:0;width:0;height:0}
.terms-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--field-border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-left:8px}
.terms-check svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:3;opacity:0;transform:scale(0);transition:all .2s}
.terms input:checked+.terms-check{background:#34c759;border-color:#34c759;animation:checkP .3s ease}
.terms input:checked+.terms-check svg{opacity:1;transform:scale(1)}
.terms-txt{font-size:.68rem;color:var(--text-muted);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.terms-txt a{color:#34c759;text-decoration:none;font-weight:600}

/* دکمه */
.btn-main{width:100%;padding:15px;background:linear-gradient(135deg,#34c759,#059669);color:#fff;border:none;border-radius:28px;font-family:inherit;font-weight:700;font-size:.92rem;cursor:pointer;position:relative;overflow:hidden;letter-spacing:.2px;margin-top:12px;box-shadow:0 8px 24px rgba(52,199,89,.25),inset 0 1px 0 rgba(255,255,255,.12);animation:bPulse 1.5s ease-in-out infinite;display:block;text-align:center;text-decoration:none}
.btn-main::after{content:'';position:absolute;top:0;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:shine 2s ease-in-out infinite;transform:skewX(-15deg)}
.btn-main:active{transform:scale(.97)}

/* انیمیشن ورود */
.fields>div:nth-child(1){animation:up .4s ease .3s both}
.fields>div:nth-child(2){animation:up .4s ease .36s both}
.fields>div:nth-child(3){animation:up .4s ease .42s both}
.fields>div:nth-child(4){animation:up .4s ease .48s both}

/* ریسپانسیو */
@media(max-width:380px){.card-inner{padding:18px 14px}.card-hdr-txt h1{font-size:1rem}.atr-badge{font-size:.6rem;padding:0 8px;height:26px}}
</style>
</head>
<body>

<input type="checkbox" id="themeChk">
<label for="themeChk" class="theme-toggle" title="تغییر تم">
<svg class="ic-moon" viewBox="0 0 24 24" width="18" height="18"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
<svg class="ic-sun" viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
</label>

<div class="theme-scope">

<div class="bg"><div class="bg-g1"></div><div class="bg-g2"></div><div class="bg-g3"></div></div>

<div class="px">
<div class="pp a" style="left:5%;top:30%"></div><div class="pp b" style="left:12%;top:55%"></div>
<div class="pp c" style="left:22%;top:72%"></div><div class="pp a" style="left:33%;top:38%"></div>
<div class="pp b" style="left:42%;top:82%"></div><div class="pp c" style="left:55%;top:28%"></div>
<div class="pp a" style="left:63%;top:62%"></div><div class="pp b" style="left:72%;top:45%"></div>
<div class="pp c" style="left:82%;top:78%"></div><div class="pp a" style="left:90%;top:52%"></div>
<div class="pp b" style="left:8%;top:88%"></div><div class="pp c" style="left:18%;top:22%"></div>
<div class="pp a" style="left:28%;top:68%"></div><div class="pp b" style="left:48%;top:32%"></div>
