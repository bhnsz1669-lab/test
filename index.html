<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | دوست‌یابی</title>
    
    <!-- فونت وزیرمتن -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome برای آیکون‌ها -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- پس‌زمینه متحرک -->
    <div class="animated-bg">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
        <div class="bg-shape shape-4"></div>
    </div>

    <!-- ذرات نورانی -->
    <div class="particles">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- کانتینر اصلی -->
    <div class="login-container">
        
        <!-- کارت شیشه‌ای -->
        <div class="glass-card">
            
            <!-- لوگو و هدر -->
            <div class="card-header">
                <div class="logo-wrapper">
                    <div class="logo-icon">
                        <i class="fa-solid fa-heart"></i>
                    </div>
                    <div class="logo-glow"></div>
                </div>
                <h1 class="card-title">خوش آمدید</h1>
                <p class="card-subtitle">برای ادامه وارد حساب خود شوید</p>
            </div>
            <!-- فرم ورود -->
            <form class="login-form" onsubmit="handleLogin(event)">
                
                <!-- فیلد نام کاربری -->
                <div class="input-group">
                    <label class="input-label">
                        <i class="fa-solid fa-user"></i>
                        نام کاربری
                    </label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="username" 
                            class="input-field" 
                            placeholder="نام کاربری خود را وارد کنید"
                            autocomplete="username"
                            required
                        >
                        <span class="input-icon">
                            <i class="fa-solid fa-at"></i>
                        </span>
                    </div>
                </div>

                <!-- فیلد رمز عبور -->
                <div class="input-group">
                    <label class="input-label">
                        <i class="fa-solid fa-lock"></i>
                        رمز عبور
                    </label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            class="input-field" 
                            placeholder="رمز عبور خود را وارد کنید"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- مرا به خاطر بسپار -->
                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">                        <span class="checkmark"></span>
                        <span class="remember-text">مرا به خاطر بسپار</span>
                    </label>
                    <a href="#" class="forgot-link">فراموشی رمز؟</a>
                </div>

                <!-- دکمه ورود -->
                <button type="submit" class="submit-btn">
                    <span class="btn-text">ورود به حساب</span>
                    <span class="btn-icon">
                        <i class="fa-solid fa-arrow-left"></i>
                    </span>
                    <div class="btn-loader" style="display:none;">
                        <div class="spinner"></div>
                    </div>
                </button>

            </form>

            <!-- جداکننده -->
            <div class="divider">
                <span>یا ورود با</span>
            </div>

            <!-- دکمه‌های شبکه‌های اجتماعی -->
            <div class="social-login">
                <button class="social-btn google" onclick="socialLogin('google')">
                    <i class="fa-brands fa-google"></i>
                </button>
                <button class="social-btn telegram" onclick="socialLogin('telegram')">
                    <i class="fa-brands fa-telegram"></i>
                </button>
                <button class="social-btn github" onclick="socialLogin('github')">
                    <i class="fa-brands fa-github"></i>
                </button>
            </div>

            <!-- لینک ثبت‌نام -->
            <div class="signup-link">
                حساب کاربری ندارید؟ 
                <a href="#" onclick="goToSignup()">ثبت‌نام کنید</a>
            </div>

        </div>

        <!-- پیام موفقیت -->
        <div class="success-message" id="successMessage">
            <div class="success-icon">
                <i class="fa-solid fa-check"></i>
            </div>            <h3>ورود موفق!</h3>
            <p>در حال انتقال...</p>
        </div>

    </div>

    <script src="./script.js"></script>
</body>
</html>
