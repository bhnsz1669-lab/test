<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | اپلیکیشن دوستیابی</title>
    
    <!-- فونت وزیرمتن -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Lordicon Library -->
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- ===== صفحه لودینگ ===== -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-bg">
            <div class="loading-shape shape-1"></div>
            <div class="loading-shape shape-2"></div>
            <div class="loading-shape shape-3"></div>
        </div>
        
        <div class="loading-particles" id="loadingParticles"></div>
        
        <div class="loading-content">
            <div class="app-icon-wrapper">
                <div class="app-icon-glow"></div>
                <div class="app-icon-ring ring-1"></div>
                <div class="app-icon-ring ring-2"></div>
                <div class="app-icon-ring ring-3"></div>
                <div class="app-icon">
                    <!-- آیکون برنامه شما - قلب -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#06b6d4"/>
                                <stop offset="50%" style="stop-color:#f59e0b"/>
                                <stop offset="100%" style="stop-color:#ec4899"/>
                            </linearGradient>
                        </defs>
                        <path fill="url(#heartGradient)" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                </div>
            </div>
            
            <h1 class="loading-title">دوست‌یابی</h1>
            <p class="loading-subtitle">در حال آماده‌سازی...</p>            
            <div class="loading-progress">
                <div class="loading-progress-bar" id="progressBar"></div>
            </div>
            
            <div class="loading-percentage" id="loadingPercentage">0%</div>
        </div>
    </div>

    <!-- ===== پس‌زمینه متحرک ===== -->
    <div class="animated-bg">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>
    
    <div class="particles" id="particles"></div>

    <!-- ===== کانتینر اصلی ===== -->
    <div class="main-container">
        <div class="box" id="mainBox">
            <div class="login">
                <div class="loginBx">
                    
                    <!-- هدر با آیکون Lordicon -->
                    <div class="form-header">
                        <lord-icon
                            src="https://cdn.lordicon.com/hxvnnmho.json"
                            trigger="loop"
                            colors="primary:#06b6d4,secondary:#f59e0b"
                            style="width:60px;height:60px">
                        </lord-icon>
                        <h2>
                            <lord-icon
                                src="https://cdn.lordicon.com/ffwtoflj.json"
                                trigger="hover"
                                colors="primary:#06b6d4"
                                style="width:28px;height:28px;vertical-align:middle">
                            </lord-icon>
                            ورود
                            <lord-icon
                                src="https://cdn.lordicon.com/ffwtoflj.json"
                                trigger="hover"
                                colors="primary:#f59e0b"
                                style="width:28px;height:28px;vertical-align:middle">
                            </lord-icon>
                        </h2>
                        <p class="form-description">به حساب کاربری خود وارد شوید</p>
                    </div>
                    <!-- فرم ورود -->
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        
                        <!-- فیلد نام کاربری -->
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <lord-icon
                                    src="https://cdn.lordicon.com/dxjqoygy.json"
                                    trigger="hover"
                                    colors="primary:#06b6d4"
                                    style="width:22px;height:22px">
                                </lord-icon>
                            </div>
                            <input 
                                type="text" 
                                id="username" 
                                placeholder="نام کاربری"
                                autocomplete="username"
                                required>
                        </div>

                        <!-- فیلد رمز عبور -->
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <lord-icon
                                    src="https://cdn.lordicon.com/egiwmiqg.json"
                                    trigger="hover"
                                    colors="primary:#06b6d4"
                                    style="width:22px;height:22px">
                                </lord-icon>
                            </div>
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="رمز عبور"
                                autocomplete="current-password"
                                required>
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <lord-icon
                                    src="https://cdn.lordicon.com/kbtmbyzy.json"
                                    trigger="hover"
                                    colors="primary:#06b6d4"
                                    id="eyeIcon"
                                    style="width:22px;height:22px">
                                </lord-icon>
                            </button>
                        </div>

                        <!-- گزینه‌ها -->
                        <div class="options-row">                            <label class="remember-me">
                                <input type="checkbox" id="remember">
                                <span class="checkmark"></span>
                                <span>مرا به خاطر بسپار</span>
                            </label>
                            <a href="#" class="forgot-link">فراموشی رمز؟</a>
                        </div>

                        <!-- دکمه ورود -->
                        <input type="submit" value="ورود به حساب" id="submitBtn">
                        
                        <!-- دکمه‌های اجتماعی -->
                        <div class="social-login">
                            <button type="button" class="social-btn" onclick="socialLogin('google')">
                                <lord-icon
                                    src="https://cdn.lordicon.com/ymgutmsg.json"
                                    trigger="hover"
                                    colors="primary:#ea4335"
                                    style="width:24px;height:24px">
                                </lord-icon>
                            </button>
                            <button type="button" class="social-btn" onclick="socialLogin('telegram')">
                                <lord-icon
                                    src="https://cdn.lordicon.com/nocovwne.json"
                                    trigger="hover"
                                    colors="primary:#0088cc"
                                    style="width:24px;height:24px">
                                </lord-icon>
                            </button>
                            <button type="button" class="social-btn" onclick="socialLogin('github')">
                                <lord-icon
                                    src="https://cdn.lordicon.com/jxzlxyso.json"
                                    trigger="hover"
                                    colors="primary:#ffffff"
                                    style="width:24px;height:24px">
                                </lord-icon>
                            </button>
                        </div>

                        <!-- لینک‌ها -->
                        <div class="group">
                            <a href="#">رمز عبور را فراموش کردم</a>
                            <a href="#" onclick="goToSignup()">ثبت نام</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- پیام موفقیت -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-card">
            <lord-icon
                src="https://cdn.lordicon.com/lupuorrc.json"
                trigger="loop"
                delay="2000"
                colors="primary:#10b981,secondary:#06b6d4"
                style="width:120px;height:120px">
            </lord-icon>
            <h3>ورود موفق!</h3>
            <p>در حال انتقال به داشبورد...</p>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
